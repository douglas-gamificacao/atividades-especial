// Estado de progresso por aluno
const studentProgress = {};

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

// FIREBASE: carregar progresso do aluno
async function loadProgress(sid) {
  try {
    const ref = doc(db, "alunos", sid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      studentProgress[sid] = snap.data();
    } else {
      studentProgress[sid] = { semanas: {} };
    }
  } catch(e) {
    studentProgress[sid] = { semanas: {} };
  }
}

// FIREBASE: salvar atividade feita
async function saveActivity(sid, weekId, actKey, result, score) {
  const now = new Date().toLocaleString("pt-BR");
  if (!studentProgress[sid]) studentProgress[sid] = { semanas: {} };
  if (!studentProgress[sid].semanas) studentProgress[sid].semanas = {};
  if (!studentProgress[sid].semanas[weekId]) studentProgress[sid].semanas[weekId] = {};
  studentProgress[sid].semanas[weekId][actKey] = { feito: true, data: now, resultado: result, pontuacao: score || "" };
  try {
    const ref = doc(db, "alunos", sid);
    await setDoc(ref, studentProgress[sid]);
  } catch(e) { console.error("Erro ao salvar:", e); }
}

function getDoneThisWeek(sid) {
  if (!studentProgress[sid]?.semanas?.[WEEK_ID]) return [];
  return Object.keys(studentProgress[sid].semanas[WEEK_ID]).filter(k => studentProgress[sid].semanas[WEEK_ID][k].feito);
}

function getActDate(sid, weekId, actKey) {
  return studentProgress[sid]?.semanas?.[weekId]?.[actKey]?.data || null;
}

async function buildTabs() {
  // Carregar todos os alunos em paralelo
  await Promise.all(STUDENTS.map(s => loadProgress(s.id)));
  document.getElementById("loading-overlay").style.display = "none";

  const te = document.getElementById("tabs"), pe = document.getElementById("panels");
  STUDENTS.forEach((s, i) => {
    const b = document.createElement("button");
    b.className = "tab-btn" + (i === 0 ? " active" : "");
    b.textContent = s.name; b.id = "tab-" + s.id;
    b.onclick = () => switchTab(s.id);
    te.appendChild(b);
    const p = document.createElement("div");
    p.className = "panel" + (i === 0 ? " active" : "");
    p.id = "panel-" + s.id;
    p.innerHTML = homeHTML(s);
    pe.appendChild(p);
    updateTabDot(s.id);
  });
}

function updateTabDot(sid) {
  const done = getDoneThisWeek(sid);
  const total = DATA[sid].acts.length;
  const tab = document.getElementById("tab-" + sid);
  if (!tab) return;
  const existing = tab.querySelector(".tab-done-dot");
  if (existing) existing.remove();
  if (done.length > 0) {
    const dot = document.createElement("span");
    dot.className = "tab-done-dot";
    dot.title = `${done.length}/${total} atividades feitas`;
    tab.appendChild(dot);
  }
}

function homeHTML(s) {
  const d = DATA[s.id];
  const done = getDoneThisWeek(s.id);
  const total = d.acts.length;
  if (done.length >= total) return completionHTML(s);
  return `<div class="card">
    <div class="student-name">Olá, ${s.name}! 👋</div>
    <div class="student-sub">${s.year} — Suas atividades desta semana</div>
    <span class="theme-pill">Tema: ${s.theme}</span>
    <div class="progress-row">
      ${d.acts.map(a => `<div class="prog-dot${done.includes(a.key) ? " done" : ""}" title="${a.title}"></div>`).join("")}
      <span class="prog-label">${done.length} de ${total} atividades feitas esta semana</span>
    </div>
  </div>
  <div class="acts-grid">
    ${d.acts.map(a => {
      const isDone = done.includes(a.key);
      const dt = getActDate(s.id, WEEK_ID, a.key);
      return `<button class="act-btn${isDone ? " act-done" : ""}" onclick="openAct('${s.id}','${a.key}')">
        ${isDone ? `<span class="act-done-badge">Feito ✓</span>` : ""}
        <div class="act-icon">${a.icon}</div>
        <div class="act-title">${a.title}</div>
        <div class="act-desc">${a.desc}</div>
        <span class="act-badge">${a.badge}</span>
        ${isDone && dt ? `<span class="act-date">Realizado em: ${dt}</span>` : ""}
      </button>`;
    }).join("")}
  </div>
  <button class="hist-btn" onclick="showHistory('${s.id}')">📋 Ver histórico completo</button>`;
}

function completionHTML(s) {
  return `<div class="card completion-screen">
    <div class="completion-icon">🎉</div>
    <div class="completion-title">Semana concluída!</div>
    <div class="completion-sub">${s.congrats}</div>
    <div class="completion-week">Semana de ${WEEK_LABEL}</div>
    <div style="margin-top:1rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="hist-btn" onclick="showHistory('${s.id}')">📋 Ver histórico completo</button>
    </div>
  </div>`;
}

function showHistory(sid) {
  const s = STUDENTS.find(x => x.id === sid);
  const prog = studentProgress[sid] || { semanas: {} };
  const semanas = prog.semanas || {};
  const weekIds = Object.keys(semanas).sort().reverse();

  const weeksHTML = weekIds.length === 0
    ? `<div class="hist-empty">Nenhuma atividade registrada ainda.</div>`
    : weekIds.map(wid => {
        const sem = semanas[wid];
        const label = wid.replace("semana_","").replace(/_/g," / ");
        const acts = DATA[sid].acts;
        const total = acts.length;
        const feitas = acts.filter(a => sem[a.key]?.feito).length;
        return `<div class="hist-week">
          <div class="hist-week-header">
            <span>Semana: ${label}</span>
            <span style="color:${feitas===total?'#1D9E75':'#666'}">${feitas}/${total} feitas</span>
          </div>
          <div class="hist-week-body">
            ${acts.map(a => {
              const entry = sem[a.key];
              return `<div class="hist-act-row">
                <span class="hist-act-name">${a.icon} ${a.title}</span>
                ${entry?.feito
                  ? `<span class="hist-act-done">✓ ${entry.data}</span>`
                  : `<span class="hist-act-pend">Não realizada</span>`}
              </div>`;
            }).join("")}
          </div>
        </div>`;
      }).join("");

  document.getElementById("panel-" + sid).innerHTML = `<div class="hist-screen">
    <div class="game-header">
      <button class="back-btn" onclick="switchTab('${sid}')">← Voltar</button>
      <span class="hist-title">📋 Histórico de ${s.name}</span>
    </div>
    <p style="font-size:13px;color:#666;margin-bottom:1rem;">Todas as semanas com atividades disponibilizadas pelo Prof. Douglas Sousa.</p>
    ${weeksHTML}
  </div>`;
}

function switchTab(id) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("tab-" + id).classList.add("active");
  document.getElementById("panel-" + id).classList.add("active");
  document.getElementById("panel-" + id).innerHTML = homeHTML(STUDENTS.find(x => x.id === id));
}

function openAct(sid, key) {
  const s = STUDENTS.find(x => x.id === sid);
  const d = DATA[sid];
  const act = d.acts.find(a => a.key === key);
  const isMJ = key.startsWith("mj_");
  let html = "";
  if (key === "memory") html = buildMemory(sid, d.memory);
  else if (key === "fillblank") html = buildFill(sid, d.fillblank);
  else if (key === "matching") html = buildMatch(sid, d.matching, d.matching.lg);
  else if (key === "goal") html = buildGoal(sid, d.goal);
  else if (key === "mj_memory") html = buildMJMemory(sid, d.mj_memory);
  else if (key === "mj_fill") html = buildMJFill(sid, d.mj_fill);
  else if (key === "mj_match") html = buildMJMatch(sid, d.mj_match);

  const weekTag = `<span class="week-tag" style="${isMJ ? "border-color:#333;color:#aaa;background:#1a1a1a;" : ""}">Semana ${WEEK_LABEL}</span>`;
  document.getElementById("panel-" + sid).innerHTML = `<div class="game-area${isMJ ? " mj-game" : ""}">
    <div class="game-header">
      <button class="back-btn" style="${isMJ ? "background:#222;color:#fff;border-color:#444;" : ""}" onclick="switchTab('${sid}')">← Voltar</button>
      <span class="game-title" style="${isMJ ? "color:#FFD700;" : ""}">${act.icon} ${act.title}</span>
      ${weekTag}
    </div>
    ${isMJ
      ? `<div class="mj-how"><span>ℹ️</span><span>${HOWTO[act.how]}</span></div>`
      : `<div class="how-to"><span>ℹ️</span><span>${HOWTO[act.how]}</span></div>`}
    ${html}</div>`;
  setTimeout(() => {
    if (key === "matching") initMatch(sid);
    if (key === "mj_match") initMJMatch(sid);
  }, 50);
}

async function onSent(sid, key, actName, result, score) {
  await saveActivity(sid, WEEK_ID, key, result, score);
  updateTabDot(sid);
  const s = STUDENTS.find(x => x.id === sid);

  const emailBody = `Aluno: ${s.full}\nTurma: ${s.year}\nTema: ${s.theme}\nAtividade: ${actName}\nSemana: ${WEEK_LABEL}\nPontuação: ${score || "—"}\n\n${result}\n\nData/Hora: ${new Date().toLocaleString("pt-BR")}`;
  const subject = `[Gamificação Total] ${s.full} — ${actName} — Semana 20/04`;

  // Mostrar feedback imediato ao aluno
  const panel = document.getElementById("panel-" + sid);
  const sending = document.createElement("div");
  sending.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:999;font-size:16px;color:#534AB7;font-weight:600;";
  sending.textContent = "Enviando para o professor... ✉️";
  document.body.appendChild(sending);

  try {
    const formData = new FormData();
    formData.append("payload", JSON.stringify({
      to: EMAIL,
      subject: subject,
      body: emailBody,
      studentName: s.full,
      activity: actName,
      week: WEEK_LABEL,
      score: score || ""
    }));

    await fetch(SCRIPT_URL, { method: "POST", body: formData });
    document.body.removeChild(sending);
    alert(`Ótimo trabalho, ${s.name}! 🎉\nAtividade registrada e email enviado ao professor Douglas!`);
  } catch(e) {
    document.body.removeChild(sending);
    alert(`Ótimo trabalho, ${s.name}! 🎉\nAtividade registrada no histórico!\nObservação: houve um problema no envio do email, avise o professor.`);
  }
  switchTab(sid);
}

// MEMORY
function buildMemory(sid, cfg) {
  const lg = cfg.lg ? "lg" : "";
  const all = shuffle([...cfg.pairs.map((p,i) => ({id:i,val:p.a,type:"a"})), ...cfg.pairs.map((p,i) => ({id:i,val:p.b,type:"b"}))]);
  window["mem_"+sid] = {cards:all,flipped:[],matched:0,locked:false,total:cfg.pairs.length};
  const cols = cfg.pairs.length <= 4 ? 3 : 4;
  return `<div class="score-bar"><span class="score-badge" id="ms-${sid}">Pares: 0/${cfg.pairs.length}</span><span class="status-txt" id="mt-${sid}">Vire as cartas!</span></div>
  <div class="mem-grid mem-grid-${cols}" id="mg-${sid}">
    ${all.map((c,i) => `<div class="mem-card ${lg}" id="mc-${sid}-${i}" onclick="flip('${sid}',${i})"><div class="back-face">?</div><div class="front-face">${c.val}</div></div>`).join("")}
  </div>
  <div id="msub-${sid}" style="display:none;" class="submit-area">
    <div class="success-msg">Todos os pares encontrados! 🎉</div>
    <button class="submit-btn" onclick="onSent('${sid}','memory','Jogo da Memória','Completou todos os ${cfg.pairs.length} pares!','${cfg.pairs.length}/${cfg.pairs.length}')">Enviar para o professor</button>
    <button class="retry-btn" onclick="openAct('${sid}','memory')">Jogar de novo</button>
  </div>`;
}

function flip(sid, idx) {
  const st = window["mem_"+sid]; if (st.locked) return;
  const el = document.getElementById("mc-"+sid+"-"+idx);
  if (el.classList.contains("matched") || el.classList.contains("flipped")) return;
  el.classList.add("flipped"); st.flipped.push(idx);
  if (st.flipped.length === 2) {
    st.locked = true; const [a,b] = st.flipped; const ca = st.cards[a], cb = st.cards[b];
    setTimeout(() => {
      if (ca.id === cb.id && ca.type !== cb.type) {
        document.getElementById("mc-"+sid+"-"+a).classList.replace("flipped","matched");
        document.getElementById("mc-"+sid+"-"+b).classList.replace("flipped","matched");
        st.matched++; document.getElementById("ms-"+sid).textContent = `Pares: ${st.matched}/${st.total}`;
        if (st.matched === st.total) { document.getElementById("mt-"+sid).textContent = "Incrível!"; document.getElementById("msub-"+sid).style.display = "block"; }
      } else {
        document.getElementById("mc-"+sid+"-"+a).classList.remove("flipped");
        document.getElementById("mc-"+sid+"-"+b).classList.remove("flipped");
      }
      st.flipped = []; st.locked = false;
    }, 900);
  }
}

// FILL
function buildFill(sid, cfg) {
  const lg = cfg.lg ? "lg" : "";
  const words = shuffle([...new Set(cfg.sentences.flatMap(s => s.options))]);
  return `<div>${cfg.sentences.map((s,i) => `<div class="fill-sentence ${lg}">${s.text.replace("___", `<input class="blank-inp ${lg}" id="fi-${sid}-${i}" data-ans="${s.blank}" placeholder="___" autocomplete="off">`)}</div>`).join("")}</div>
  <div class="word-bank"><span style="font-size:13px;color:#666;align-self:center;">Palavras:</span>
    ${words.map(w => `<span class="word-chip ${lg}" onclick="useWord('${sid}',this,'${w}')">${w}</span>`).join("")}
  </div>
  <div class="submit-area">
    <button class="submit-btn" onclick="checkFill('${sid}')">Verificar e enviar</button>
    <button class="retry-btn" onclick="openAct('${sid}','fillblank')">Recomeçar</button>
  </div>`;
}

window.useWord = function(sid, chip, word) {
  if (chip.classList.contains("used")) return;
  const inputs = document.querySelectorAll(`[id^="fi-${sid}-"]`);
  for (const inp of inputs) { if (!inp.value) { inp.value = word; chip.classList.add("used"); return; } }
};

window.checkFill = function(sid) {
  const cfg = DATA[sid].fillblank; let ok = 0, res = [];
  cfg.sentences.forEach((s,i) => {
    const inp = document.getElementById(`fi-${sid}-${i}`);
    const v = inp.value.trim().toLowerCase(), a = s.blank.toLowerCase();
    const correct = v === a; inp.classList.add(correct ? "correct" : "wrong");
    if (correct) ok++;
    res.push(`"${s.text.replace("___","["+inp.value+"]")}" — ${correct ? "Correto" : "Errado (correto: "+s.blank+")"}`);
  });
  onSent(sid, "fillblank", "Preencha as Lacunas", `Acertos: ${ok}/${cfg.sentences.length}\n\nRespostas:\n${res.join("\n")}`, `${ok}/${cfg.sentences.length}`);
};

// MATCH
function buildMatch(sid, cfg, lg) {
  const lc = lg ? "lg" : "";
  return `<div class="match-area">
    <div class="match-col" id="ml-${sid}">${cfg.pairs.map((p,i) => `<div class="match-item ${lc}" id="mli-${sid}-${i}" onclick="selMatch('${sid}','l',${i})">${p.left}</div>`).join("")}</div>
    <div class="match-col" id="mr-${sid}"></div>
  </div>
  <div id="mres-${sid}"></div>
  <div class="submit-area" id="msub2-${sid}" style="display:none;">
    <button class="submit-btn" onclick="submitMatch('${sid}')">Enviar para o professor</button>
    <button class="retry-btn" onclick="openAct('${sid}','matching')">Tentar de novo</button>
  </div>`;
}

window.initMatch = function(sid) {
  const cfg = DATA[sid].matching; const lg = cfg.lg ? "lg" : "";
  window["mat_"+sid] = {lsel:null,rsel:null,pairs:[],done:0};
  const order = shuffle(cfg.pairs.map((_,i) => i));
  document.getElementById("mr-"+sid).innerHTML = order.map(i => `<div class="match-item ${lg}" id="mri-${sid}-${i}" onclick="selMatch('${sid}','r',${i})">${cfg.pairs[i].right}</div>`).join("");
};

window.selMatch = function(sid, side, idx) {
  const st = window["mat_"+sid]; const cfg = DATA[sid].matching;
  const el = document.getElementById((side==="l"?"mli-":"mri-")+sid+"-"+idx);
  if (el.classList.contains("matched-ok")) return;
  if (side==="l") { if (st.lsel!==null) document.getElementById("mli-"+sid+"-"+st.lsel).classList.remove("selected"); st.lsel=idx; el.classList.add("selected"); }
  else { if (st.rsel!==null) document.getElementById("mri-"+sid+"-"+st.rsel).classList.remove("selected"); st.rsel=idx; el.classList.add("selected"); }
  if (st.lsel!==null && st.rsel!==null) {
    const le = document.getElementById("mli-"+sid+"-"+st.lsel); const re = document.getElementById("mri-"+sid+"-"+st.rsel);
    const ok = cfg.pairs[st.lsel].right === cfg.pairs[st.rsel].right;
    le.classList.remove("selected"); re.classList.remove("selected");
    if (ok) { le.classList.add("matched-ok"); re.classList.add("matched-ok"); st.done++; st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:true}); }
    else { le.classList.add("matched-err"); re.classList.add("matched-err"); st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:false}); setTimeout(()=>{le.classList.remove("matched-err");re.classList.remove("matched-err");},900); }
    st.lsel=null; st.rsel=null;
    if (st.done === cfg.pairs.length) { document.getElementById("mres-"+sid).innerHTML='<div class="success-msg" style="margin-top:1rem;">Todos os pares ligados! 🎉</div>'; document.getElementById("msub2-"+sid).style.display="block"; }
  }
};

window.submitMatch = function(sid) {
  const st = window["mat_"+sid]; const cfg = DATA[sid].matching;
  const ok = st.pairs.filter(p => p.ok).length;
  onSent(sid, "matching", "Ligar Palavras", `Acertos: ${ok}/${cfg.pairs.length}\n\nRespostas:\n${st.pairs.map(p=>`${p.l} → ${p.r}: ${p.ok?"Correto":"Errado"}`).join("\n")}`, `${ok}/${cfg.pairs.length}`);
};

// GOAL
function buildGoal(sid, cfg) {
  const shuffledQ = shuffle(cfg.questions.map(q => ({...q, options:shuffle(q.options)})));
  window["goal_"+sid] = {questions:shuffledQ,q:0,score:0,total:shuffledQ.length,answers:[]};
  return `<div class="goal-board">
    <div class="goal-score" id="gs-${sid}">0</div>
    <div class="goal-label">GOLS MARCADOS</div>
    <div class="goal-bar" id="gb-${sid}">${shuffledQ.map(()=>'<span class="goal-icon">⚪</span>').join("")}</div>
  </div><div id="gq-${sid}">${renderGoalQ(sid,0)}</div>`;
}

function renderGoalQ(sid, qi) {
  const st = window["goal_"+sid];
  if (qi >= st.total) return `<div class="success-msg">Partida encerrada! Você marcou ${st.score} gols de ${st.total}! 🏆</div>
    <div class="submit-area">
      <button class="submit-btn" onclick="submitGoal('${sid}')">Enviar placar para o professor</button>
      <button class="retry-btn" onclick="openAct('${sid}','goal')">Jogar de novo</button>
    </div>`;
  const q = st.questions[qi];
  return `<div class="hint-box">Pergunta ${qi+1} de ${st.total}</div>
  <p style="font-size:16px;font-weight:600;color:#222;margin-bottom:1rem;">${q.q}</p>
  <div class="ans-grid">${q.options.map((o,i)=>`<button class="ans-btn" id="ab-${sid}-${qi}-${i}" onclick="answerGoal('${sid}',${qi},'${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join("")}</div>`;
}

window.answerGoal = function(sid, qi, chosen, btn) {
  const st = window["goal_"+sid]; const q = st.questions[qi]; const ok = chosen === q.correct;
  document.querySelectorAll(`[id^="ab-${sid}-${qi}-"]`).forEach(b => { b.disabled=true; if(b.textContent===q.correct) b.classList.add("correct-ans"); });
  if (!ok) btn.classList.add("wrong-ans");
  if (ok) st.score++;
  st.answers.push({q:q.q,chosen,correct:q.correct,ok});
  document.getElementById("gs-"+sid).textContent = st.score;
  const balls = document.getElementById("gb-"+sid).querySelectorAll(".goal-icon");
  if (balls[qi]) balls[qi].textContent = ok ? "⚽" : "❌";
  st.q = qi+1;
  setTimeout(() => { document.getElementById("gq-"+sid).innerHTML = renderGoalQ(sid,qi+1); }, 1200);
};

window.submitGoal = function(sid) {
  const st = window["goal_"+sid];
  const res = st.answers.map(a=>`${a.q}\nResposta: ${a.chosen} — ${a.ok?"Correto":"Errado (correto: "+a.correct+")"}`).join("\n\n");
  onSent(sid, "goal", "Jogo dos Gols", `Placar final: ${st.score}/${st.total} gols!\n\n${res}`, `${st.score}/${st.total}`);
};

// MJ MEMORY
function buildMJMemory(sid, cfg) {
  const all = shuffle([...cfg.pairs.map((p,i)=>({id:i,val:p.a,type:"a"})),...cfg.pairs.map((p,i)=>({id:i,val:p.b,type:"b"}))]);
  window["mjm_"+sid] = {cards:all,flipped:[],matched:0,locked:false,total:cfg.pairs.length};
  return `<div style="margin-bottom:1rem;"><span class="mj-score-lbl" id="mjs-${sid}">Pares: 0/${cfg.pairs.length}</span><span style="margin-left:10px;font-size:13px;color:#aaa;" id="mjt-${sid}">Vire as cartas!</span></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:520px;margin:0 auto;" id="mjg-${sid}">
    ${all.map((c,i)=>`<div class="mj-mem-card" id="mjc-${sid}-${i}" onclick="flipMJ('${sid}',${i})"><div class="back-face">🎵</div><div class="front-face">${c.val}</div></div>`).join("")}
  </div>
  <div id="mjsub-${sid}" style="display:none;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #333;">
    <div class="mj-success">Todos os pares! Show! 🎤</div>
    <button class="mj-submit" onclick="onSent('${sid}','mj_memory','Jogo da Memória','Completou todos os ${cfg.pairs.length} pares!','${cfg.pairs.length}/${cfg.pairs.length}')">Enviar para o professor</button>
    <button class="retry-btn" style="border-color:#FFD700;color:#FFD700;margin-left:10px;" onclick="openAct('${sid}','mj_memory')">Jogar de novo</button>
  </div>`;
}

window.flipMJ = function(sid, idx) {
  const st = window["mjm_"+sid]; if (st.locked) return;
  const el = document.getElementById("mjc-"+sid+"-"+idx);
  if (el.classList.contains("matched") || el.classList.contains("flipped")) return;
  el.classList.add("flipped"); st.flipped.push(idx);
  if (st.flipped.length === 2) {
    st.locked=true; const[a,b]=st.flipped; const ca=st.cards[a],cb=st.cards[b];
    setTimeout(()=>{
      if(ca.id===cb.id&&ca.type!==cb.type){
        document.getElementById("mjc-"+sid+"-"+a).classList.replace("flipped","matched");
        document.getElementById("mjc-"+sid+"-"+b).classList.replace("flipped","matched");
        st.matched++; document.getElementById("mjs-"+sid).textContent=`Pares: ${st.matched}/${st.total}`;
        if(st.matched===st.total){document.getElementById("mjt-"+sid).textContent="Show! 🎤";document.getElementById("mjsub-"+sid).style.display="block";}
      }else{document.getElementById("mjc-"+sid+"-"+a).classList.remove("flipped");document.getElementById("mjc-"+sid+"-"+b).classList.remove("flipped");}
      st.flipped=[]; st.locked=false;
    },900);
  }
};

// MJ FILL
function buildMJFill(sid, cfg) {
  const words = shuffle([...new Set(cfg.sentences.flatMap(s=>s.options))]);
  return `<div>${cfg.sentences.map((s,i)=>`<div class="mj-fill-sentence">${s.text.replace("___",`<input class="mj-blank" id="mjf-${sid}-${i}" data-ans="${s.blank}" placeholder="___" autocomplete="off">`)}</div>`).join("")}</div>
  <div class="word-bank" style="margin:.75rem 0 1.25rem;"><span style="font-size:13px;color:#aaa;align-self:center;">Palavras:</span>
    ${words.map(w=>`<span class="mj-chip" onclick="useMJWord('${sid}',this,'${w}')">${w}</span>`).join("")}
  </div>
  <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #333;">
    <button class="mj-submit" onclick="checkMJFill('${sid}')">Verificar e enviar</button>
    <button class="retry-btn" style="border-color:#FFD700;color:#FFD700;margin-left:10px;" onclick="openAct('${sid}','mj_fill')">Recomeçar</button>
  </div>`;
}

window.useMJWord = function(sid, chip, word) {
  if (chip.classList.contains("used")) return;
  const inputs = document.querySelectorAll(`[id^="mjf-${sid}-"]`);
  for (const inp of inputs) { if (!inp.value) { inp.value=word; chip.classList.add("used"); return; } }
};

window.checkMJFill = function(sid) {
  const cfg = DATA[sid].mj_fill; let ok=0,res=[];
  cfg.sentences.forEach((s,i)=>{
    const inp = document.getElementById(`mjf-${sid}-${i}`);
    const v=inp.value.trim().toLowerCase(),a=s.blank.toLowerCase();
    const correct=v===a; inp.classList.add(correct?"correct":"wrong");
    if(correct)ok++;
    res.push(`"${s.text.replace("___","["+inp.value+"]")}" — ${correct?"Correto":"Errado (correto: "+s.blank+")"}`);
  });
  onSent(sid,"mj_fill","Preencha as Lacunas",`Acertos: ${ok}/${cfg.sentences.length}\n\nRespostas:\n${res.join("\n")}`,`${ok}/${cfg.sentences.length}`);
};

// MJ MATCH
function buildMJMatch(sid, cfg) {
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:560px;">
    <div style="display:flex;flex-direction:column;gap:8px;" id="mjml-${sid}">${cfg.pairs.map((p,i)=>`<div class="mj-match" id="mjmli-${sid}-${i}" onclick="selMJMatch('${sid}','l',${i})">${p.left}</div>`).join("")}</div>
    <div style="display:flex;flex-direction:column;gap:8px;" id="mjmr-${sid}"></div>
  </div>
  <div id="mjmres-${sid}"></div>
  <div id="mjmsub-${sid}" style="display:none;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #333;">
    <button class="mj-submit" onclick="submitMJMatch('${sid}')">Enviar para o professor</button>
    <button class="retry-btn" style="border-color:#FFD700;color:#FFD700;margin-left:10px;" onclick="openAct('${sid}','mj_match')">Tentar de novo</button>
  </div>`;
}

window.initMJMatch = function(sid) {
  const cfg = DATA[sid].mj_match;
  window["mjmat_"+sid] = {lsel:null,rsel:null,pairs:[],done:0};
  const order = shuffle(cfg.pairs.map((_,i)=>i));
  document.getElementById("mjmr-"+sid).innerHTML = order.map(i=>`<div class="mj-match" id="mjmri-${sid}-${i}" onclick="selMJMatch('${sid}','r',${i})">${cfg.pairs[i].right}</div>`).join("");
};

window.selMJMatch = function(sid, side, idx) {
  const st = window["mjmat_"+sid]; const cfg = DATA[sid].mj_match;
  const el = document.getElementById((side==="l"?"mjmli-":"mjmri-")+sid+"-"+idx);
  if (el.classList.contains("matched-ok")) return;
  if (side==="l"){if(st.lsel!==null)document.getElementById("mjmli-"+sid+"-"+st.lsel).classList.remove("selected");st.lsel=idx;el.classList.add("selected");}
  else{if(st.rsel!==null)document.getElementById("mjmri-"+sid+"-"+st.rsel).classList.remove("selected");st.rsel=idx;el.classList.add("selected");}
  if (st.lsel!==null && st.rsel!==null) {
    const le=document.getElementById("mjmli-"+sid+"-"+st.lsel); const re=document.getElementById("mjmri-"+sid+"-"+st.rsel);
    const ok=cfg.pairs[st.lsel].right===cfg.pairs[st.rsel].right;
    le.classList.remove("selected"); re.classList.remove("selected");
    if(ok){le.classList.add("matched-ok");re.classList.add("matched-ok");st.done++;st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:true});}
    else{le.classList.add("matched-err");re.classList.add("matched-err");st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:false});setTimeout(()=>{le.classList.remove("matched-err");re.classList.remove("matched-err");},900);}
    st.lsel=null; st.rsel=null;
    if(st.done===cfg.pairs.length){document.getElementById("mjmres-"+sid).innerHTML='<div class="mj-success" style="margin-top:1rem;">Show! Todos ligados! 🎤</div>';document.getElementById("mjmsub-"+sid).style.display="block";}
  }
};

window.submitMJMatch = function(sid) {
  const st=window["mjmat_"+sid]; const cfg=DATA[sid].mj_match;
  const ok=st.pairs.filter(p=>p.ok).length;
  onSent(sid,"mj_match","Ligar Palavras",`Acertos: ${ok}/${cfg.pairs.length}\n\nRespostas:\n${st.pairs.map(p=>`${p.l} → ${p.r}: ${p.ok?"Correto":"Errado"}`).join("\n")}`,`${ok}/${cfg.pairs.length}`);
};

// Expor funções globais necessárias
window.openAct = openAct;
window.switchTab = switchTab;
window.showHistory = showHistory;
window.flip = flip;
window.onSent = onSent;

buildTabs();
</script>

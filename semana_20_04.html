// ── UTILS ──────────────────────────────────────────────────
const studentProgress={};
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function parseScore(s){if(!s)return{ok:0,total:0,pct:0};const m=s.match(/(\d+)\/(\d+)/);if(!m)return{ok:0,total:0,pct:0};const ok=parseInt(m[1]),t=parseInt(m[2]);return{ok,total:t,pct:t>0?Math.round(ok/t*100):0};}
function inferSuccess(e){if(e.sucesso===true)return true;if(e.sucesso===false)return false;const s=e.pontuacao||'';if(!s)return false;if(s.includes('${')||s.includes('cfg.'))return true;const m=s.match(/^(\d+)\/(\d+)$/);if(m){const ok=parseInt(m[1]),t=parseInt(m[2]);return t>0&&ok===t;}if(e.tentativas)return e.tentativas.some(t=>{if(t.sucesso===true)return true;const ts=t.pontuacao||'';if(ts.includes('${'))return true;const tm=ts.match(/^(\d+)\/(\d+)$/);return tm&&parseInt(tm[1])===parseInt(tm[2])&&parseInt(tm[2])>0;});return false;}
function getActStatus(sid,wid,k){const e=studentProgress[sid]?.semanas?.[wid]?.[k];if(!e?.feito)return null;return inferSuccess(e)?'success':'improve';}
function getActDate(sid,wid,k){return studentProgress[sid]?.semanas?.[wid]?.[k]?.data||null;}
function getActAttempts(sid,wid,k){return studentProgress[sid]?.semanas?.[wid]?.[k]?.tentativas?.length||0;}
function getDoneThisWeek(sid){if(!studentProgress[sid]?.semanas?.[WEEK_ID])return[];return Object.keys(studentProgress[sid].semanas[WEEK_ID]).filter(k=>studentProgress[sid].semanas[WEEK_ID][k].feito);}

async function loadProgress(sid){try{const sn=await getDoc(doc(db,"alunos",sid));studentProgress[sid]=sn.exists()?sn.data():{semanas:{}};}catch{studentProgress[sid]={semanas:{}};}}
async function saveActivity(sid,wid,k,result,score,isSuccess){
  const now=new Date().toLocaleString("pt-BR");
  if(!studentProgress[sid])studentProgress[sid]={semanas:{}};
  if(!studentProgress[sid].semanas)studentProgress[sid].semanas={};
  if(!studentProgress[sid].semanas[wid])studentProgress[sid].semanas[wid]={};
  const ex=studentProgress[sid].semanas[wid][k]||{};
  const attempts=[...(ex.tentativas||[]),{data:now,resultado:result,pontuacao:score||"",sucesso:isSuccess}];
  studentProgress[sid].semanas[wid][k]={feito:true,data:attempts[0].data,dataUltima:now,resultado:result,pontuacao:score||"",sucesso:isSuccess||inferSuccess(ex)||false,tentativas:attempts};

}

function buildMemory(sid,cfg){
  const lg=cfg.lg?"lg":"",all=shuffle([...cfg.pairs.map((p,i)=>({id:i,val:p.a,type:"a"})),...cfg.pairs.map((p,i)=>({id:i,val:p.b,type:"b"}))]);

  return`<div class="score-bar"><span class="score-badge" id="ms-${sid}">PARES: 0/${cfg.pairs.length}</span><span class="status-txt" id="mt-${sid}">VIRE AS CARTAS!</span></div>
  <div class="mem-grid mem-grid-${cols}" id="mg-${sid}">${all.map((c,i)=>`<div class="mem-card ${lg}" id="mc-${sid}-${i}" onclick="flip('${sid}',${i})"><div class="back-face">?</div><div class="front-face">${c.val}</div></div>`).join("")}</div>

}
window.flip=function(sid,idx){
  const st=window["mem_"+sid];if(st.locked)return;
  const el=document.getElementById("mc-"+sid+"-"+idx);if(el.classList.contains("matched")||el.classList.contains("flipped"))return;
  el.classList.add("flipped");st.flipped.push(idx);
  if(st.flipped.length===2){st.locked=true;const[a,b]=st.flipped;const ca=st.cards[a],cb=st.cards[b];setTimeout(()=>{if(ca.id===cb.id&&ca.type!==cb.type){document.getElementById("mc-"+sid+"-"+a).classList.replace("flipped","matched");document.getElementById("mc-"+sid+"-"+b).classList.replace("flipped","matched");st.matched++;document.getElementById("ms-"+sid).textContent=`PARES: ${st.matched}/${st.total}`;if(st.matched===st.total){document.getElementById("mt-"+sid).textContent="INCRÍVEL!";document.getElementById("msub-"+sid).style.display="block";}}else{document.getElementById("mc-"+sid+"-"+a).classList.remove("flipped");document.getElementById("mc-"+sid+"-"+b).classList.remove("flipped");}st.flipped=[];st.locked=false;},900);}
};

window.checkFill=function(sid,key){

function initMatch(sid,key,cfg){
  const k=key||"matching",isMJ=k==="mj_match",lg=cfg?.lg?"lg":"";
  window["mat_"+sid+"_"+k]={lsel:null,rsel:null,pairs:[],done:0,cfg};
  const order=shuffle(cfg.pairs.map((_,i)=>i));
  const IC=isMJ?"mj-match":"match-item "+lg;
  document.getElementById("mr-"+sid+"-"+k).innerHTML=order.map(i=>`<div class="${IC}" id="mri-${sid}-${k}-${i}" onclick="selMatch('${sid}','r',${i},'${k}')">${cfg.pairs[i].right}</div>`).join("");
}
window.selMatch=function(sid,side,idx,key){
  const k=key||"matching",st=window["mat_"+sid+"_"+k];if(!st)return;
  const cfg=st.cfg,el=document.getElementById((side==="l"?"mli-":"mri-")+sid+"-"+k+"-"+idx);
  if(el.classList.contains("matched-ok"))return;
  if(side==="l"){if(st.lsel!==null){const p=document.getElementById("mli-"+sid+"-"+k+"-"+st.lsel);if(p)p.classList.remove("selected");}st.lsel=idx;el.classList.add("selected");}
  else{if(st.rsel!==null){const p=document.getElementById("mri-"+sid+"-"+k+"-"+st.rsel);if(p)p.classList.remove("selected");}st.rsel=idx;el.classList.add("selected");}
  if(st.lsel!==null&&st.rsel!==null){
    const le=document.getElementById("mli-"+sid+"-"+k+"-"+st.lsel),re=document.getElementById("mri-"+sid+"-"+k+"-"+st.rsel);
    const ok=cfg.pairs[st.lsel].right===cfg.pairs[st.rsel].right;
    le.classList.remove("selected");re.classList.remove("selected");
    if(ok){le.classList.add("matched-ok");re.classList.add("matched-ok");st.done++;st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:true});}
    else{le.classList.add("matched-err");re.classList.add("matched-err");st.pairs.push({l:cfg.pairs[st.lsel].left,r:cfg.pairs[st.rsel].right,ok:false});setTimeout(()=>{le.classList.remove("matched-err");re.classList.remove("matched-err");},900);}
    st.lsel=null;st.rsel=null;
    if(st.done===cfg.pairs.length){const isMJ=k==="mj_match";document.getElementById("mres-"+sid+"-"+k).innerHTML=isMJ?'<div class="mj-success" style="margin-top:1rem;">SHOW! TODOS LIGADOS! 🎤</div>':'<div class="success-msg" style="margin-top:1rem;">TODOS OS PARES LIGADOS! 🎉</div>';document.getElementById("msub-"+sid+"-"+k).style.display="block";}
  }
};
window.submitMatch=function(sid,key){
  const k=key||"matching",st=window["mat_"+sid+"_"+k],cfg=st.cfg,ok=st.pairs.filter(p=>p.ok).length;
  const names={matching:"LIGAR PALAVRAS",mj_match:"LIGA AS IDEIAS",filo_matching:"FILOSOFIA — LIGAR CONCEITOS",socio_matching:"SOCIOLOGIA — LIGAR CONCEITOS"};
  onSent(sid,k,names[k]||"LIGAR CONCEITOS",`ACERTOS: ${ok}/${cfg.pairs.length}\n\n${st.pairs.map(p=>`${p.l} → ${p.r}: ${p.ok?"CORRETO":"ERRADO"}`).join("\n")}`,`${ok}/${cfg.pairs.length}`);
};

// ── GOLS ───────────────────────────────────────────────────
function buildGoal(sid,cfg){
  const sq=shuffle(cfg.questions.map(q=>({...q,options:shuffle(q.options)})));
  window["goal_"+sid]={questions:sq,q:0,score:0,total:sq.length,answers:[]};
  return`<div class="goal-board"><div class="goal-score" id="gs-${sid}">0</div><div class="goal-label">GOLS MARCADOS</div><div class="goal-bar" id="gb-${sid}">${sq.map(()=>'<span class="goal-icon">⚪</span>').join("")}</div></div><div id="gq-${sid}">${renderGoalQ(sid,0)}</div>`;
}
function renderGoalQ(sid,qi){
  const st=window["goal_"+sid];
  if(qi>=st.total)return`<div class="success-msg">PARTIDA ENCERRADA! VOCÊ MARCOU ${st.score} GOLS DE ${st.total}! 🏆</div><div class="submit-area"><button class="submit-btn" onclick="submitGoal('${sid}')">ENVIAR PLACAR PARA O PROFESSOR</button><button class="retry-btn" onclick="openAct('${sid}','goal')">JOGAR DE NOVO</button></div>`;
  const q=st.questions[qi];
  return`<div class="hint-box">PERGUNTA ${qi+1} DE ${st.total}</div><p style="font-size:17px;font-weight:700;color:#222;margin-bottom:1rem;">${q.q}</p><div class="ans-grid">${q.options.map((o,i)=>`<button class="ans-btn" id="ab-${sid}-${qi}-${i}" onclick="answerGoal('${sid}',${qi},'${o.replace(/'/g,"\\'")}',this)">${o}</button>`).join("")}</div>`;
}
window.answerGoal=function(sid,qi,chosen,btn){
  const st=window["goal_"+sid],q=st.questions[qi],ok=chosen===q.correct;
  document.querySelectorAll(`[id^="ab-${sid}-${qi}-"]`).forEach(b=>{b.disabled=true;if(b.textContent===q.correct)b.classList.add("correct-ans");});
  if(!ok)btn.classList.add("wrong-ans");if(ok)st.score++;
  st.answers.push({q:q.q,chosen,correct:q.correct,ok});document.getElementById("gs-"+sid).textContent=st.score;
  const balls=document.getElementById("gb-"+sid).querySelectorAll(".goal-icon");if(balls[qi])balls[qi].textContent=ok?"⚽":"❌";
  st.q=qi+1;setTimeout(()=>{document.getElementById("gq-"+sid).innerHTML=renderGoalQ(sid,qi+1);},1200);
};
window.submitGoal=function(sid){
  const st=window["goal_"+sid];
  const res=st.answers.map(a=>`${a.q}\nRESPOSTA: ${a.chosen} — ${a.ok?"CORRETO":"ERRADO (CORRETO: "+a.correct+")"}`).join("\n\n");
  onSent(sid,"goal","JOGO DOS GOLS",`PLACAR: ${st.score}/${st.total} GOLS!\n\n${res}`,`${st.score}/${st.total}`);
};

// ── CAÇA-PALAVRAS ──────────────────────────────────────────
function buildWordSearch(sid,cfg,key){
  const R=cfg.grid.length,C=cfg.grid[0].length;
  let cells='';for(let r=0;r<R;r++)for(let c=0;c<C;c++)cells+=`<div class="ws-cell" id="wsc-${sid}-${key}-${r}-${c}" onclick="wsClick('${sid}','${key}',${r},${c})">${cfg.grid[r][c]}</div>`;
  const wlist=cfg.words.map(w=>`<span class="ws-word" id="wsw-${sid}-${key}-${w}">${w}</span>`).join('');
  return`<div class="score-bar"><span class="score-badge" id="wsscore-${sid}-${key}">ENCONTRADAS: 0/${cfg.words.length}</span><span class="status-txt" id="wsstat-${sid}-${key}">CLIQUE NA 1ª LETRA E DEPOIS NA ÚLTIMA!</span></div>
  <div class="ws-words">${wlist}</div>
  <div class="ws-wrap"><div class="ws-grid" style="grid-template-columns:repeat(${C},36px);">${cells}</div></div>
  <div id="wssub-${sid}-${key}" style="display:none;" class="submit-area">
    <div class="success-msg">TODAS AS PALAVRAS ENCONTRADAS! 🎉</div>
    <button class="submit-btn" onclick="submitWS('${sid}','${key}')">ENVIAR PARA O PROFESSOR</button>
    <button class="retry-btn" onclick="openAct('${sid}','${key}')">JOGAR DE NOVO</button>
  </div>`;
}
function initWS(sid,key,cfg){window["ws_"+sid+"_"+key]={first:null,found:[],total:cfg.words.length,cfg};}
window.wsClick=function(sid,key,r,c){
  const st=window["ws_"+sid+"_"+key];if(!st)return;const cfg=st.cfg;
  if(!st.first){st.first={r,c};document.getElementById(`wsc-${sid}-${key}-${r}-${c}`).classList.add("selecting");document.getElementById(`wsstat-${sid}-${key}`).textContent="AGORA CLIQUE NA ÚLTIMA LETRA!";return;}
  const r1=st.first.r,c1=st.first.c;document.getElementById(`wsc-${sid}-${key}-${r1}-${c1}`).classList.remove("selecting");st.first=null;
  document.getElementById(`wsstat-${sid}-${key}`).textContent="CLIQUE NA 1ª LETRA E DEPOIS NA ÚLTIMA!";
  const dr=r===r1?0:(r>r1?1:-1),dc=c===c1?0:(c>c1?1:-1);
  let sel="",cells=[];let cr=r1,cc=c1;
  for(let i=0;i<20;i++){if(cr<0||cr>=cfg.grid.length||cc<0||cc>=cfg.grid[0].length)break;sel+=cfg.grid[cr][cc];cells.push({r:cr,c:cc});if(cr===r&&cc===c)break;cr+=dr;cc+=dc;}
  const rev=sel.split("").reverse().join("");
  const match=cfg.words.find(w=>w===sel||w===rev);
  if(match&&!st.found.includes(match)){
    st.found.push(match);cells.forEach(({r:cr2,c:cc2})=>document.getElementById(`wsc-${sid}-${key}-${cr2}-${cc2}`).classList.add("found"));
    document.getElementById(`wsw-${sid}-${key}-${match}`).classList.add("found");document.getElementById(`wsscore-${sid}-${key}`).textContent=`ENCONTRADAS: ${st.found.length}/${st.total}`;
    if(st.found.length===st.total){document.getElementById(`wsstat-${sid}-${key}`).textContent="INCRÍVEL! TODAS ENCONTRADAS! 🎉";document.getElementById(`wssub-${sid}-${key}`).style.display="block";}
  }
};
window.submitWS=function(sid,key){
  const st=window["ws_"+sid+"_"+key];
  const names={filo_wordsearch:"FILOSOFIA — CAÇA-PALAVRAS",socio_wordsearch:"SOCIOLOGIA — CAÇA-PALAVRAS"};
  onSent(sid,key,names[key]||"CAÇA-PALAVRAS",`PALAVRAS ENCONTRADAS: ${st.found.join(", ")} (${st.found.length}/${st.total})`,`${st.found.length}/${st.total}`);
};

// ── CRUZADINHA ─────────────────────────────────────────────
function buildCrossword(sid,cfg,key){
  const R=cfg.rows,C=cfg.cols;
  const grid=Array.from({length:R},()=>Array(C).fill(null));
  cfg.words.forEach(w=>{for(let i=0;i<w.word.length;i++){const r=w.dir==="H"?w.row:w.row+i,c=w.dir==="H"?w.col+i:w.col;if(r<0||r>=R||c<0||c>=C)return;if(!grid[r][c])grid[r][c]={num:null};if(i===0)grid[r][c].num=w.num;}});
  let cells='';for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(!grid[r][c]){cells+=`<div class="cw-cell black"></div>`;continue;}cells+=`<div class="cw-cell">${grid[r][c].num?`<span class="cw-num">${grid[r][c].num}</span>`:''}<input maxlength="1" id="cwi-${sid}-${key}-${r}-${c}" autocomplete="off" oninput="this.value=this.value.toUpperCase()"></div>`;}
  const hC=cfg.words.filter(w=>w.dir==="H").map(w=>`<div class="cw-clue"><span>${w.num}.</span>${w.clue}</div>`).join('');
  const vC=cfg.words.filter(w=>w.dir==="V").map(w=>`<div class="cw-clue"><span>${w.num}.</span>${w.clue}</div>`).join('');
  return`<div class="cw-wrap"><div class="cw-grid" style="grid-template-columns:repeat(${C},38px);grid-template-rows:repeat(${R},38px);">${cells}</div></div>
  <div class="cw-clues"><div class="cw-clue-group"><h4>➡️ HORIZONTAL</h4>${hC}</div><div class="cw-clue-group"><h4>⬇️ VERTICAL</h4>${vC}</div></div>
  <div class="submit-area"><button class="submit-btn" onclick="checkCW('${sid}','${key}')">VERIFICAR E ENVIAR</button><button class="retry-btn" onclick="openAct('${sid}','${key}')">RECOMEÇAR</button></div>`;
}
window.checkCW=function(sid,key){
  const cfg=DATA[sid][key];let ok=0,total=0,res=[];
  cfg.words.forEach(w=>{let wOk=true;for(let i=0;i<w.word.length;i++){const r=w.dir==="H"?w.row:w.row+i,c=w.dir==="H"?w.col+i:w.col;const inp=document.getElementById(`cwi-${sid}-${key}-${r}-${c}`);if(!inp)continue;total++;const v=inp.value.trim().toUpperCase(),correct=v===w.word[i].toUpperCase();inp.classList.remove("correct","wrong");inp.classList.add(correct?"correct":"wrong");if(!correct)wOk=false;else ok++;}res.push(`${w.dir==="H"?"➡️":"⬇️"} ${w.num}. ${w.word}: ${wOk?"CORRETO ✓":"INCORRETO"}`);});
  const names={filo_crossword:"FILOSOFIA — CRUZADINHA",socio_crossword:"SOCIOLOGIA — CRUZADINHA"};
  onSent(sid,key,names[key]||"CRUZADINHA",`LETRAS CORRETAS: ${ok}/${total}\n\nPALAVRAS:\n${res.join("\n")}`,`${ok}/${total}`);
};

// ── GLOBAIS ────────────────────────────────────────────────
window.openAct=openAct;window.switchTab=switchTab;window.showHistory=showHistory;
buildTabs();
</script>
